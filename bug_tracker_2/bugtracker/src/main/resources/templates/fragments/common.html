<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title + ' | BugTrackPro'}">BugTrackPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">BugTrackPro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/projects}">Projects</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/bugs}">Bugs</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/bugs/new}">Report Bug</a></li>
                <li class="nav-item" th:if="${isAdmin == true or isProjectManager == true}">
                    <a class="nav-link" th:href="@{/reports}">Reports</a>
                </li>
                <li class="nav-item" th:if="${isAdmin == true}">
                    <a class="nav-link" th:href="@{/users}">Users</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3" th:if="${currentUser != null}">
                <!-- <div class="text-end">
                    <div class="fw-bold white" th:text="${currentUser.fullName}">Current User</div>
                    <div class="small text-secondary" th:text="${currentUser.role.label}">Role</div>
                </div> -->
                <div class="text-end">
    <div class="fw-bold text-white" th:text="${currentUser.fullName}">Current User</div>
    <div class="small text-white-50" th:text="${currentUser.role.label}">Role</div>
</div>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div th:fragment="alerts" class="container py-3">
    <div th:if="${successMessage}" class="alert alert-success shadow-sm" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger shadow-sm" th:text="${errorMessage}"></div>
</div>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
