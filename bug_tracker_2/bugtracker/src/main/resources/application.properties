spring.application.name=BugTrackPro

spring.datasource.url=${BUGTRACKER_DB_URL:jdbc:h2:mem:bugtracker;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${BUGTRACKER_DB_USERNAME:sa}
spring.datasource.password=${BUGTRACKER_DB_PASSWORD:}
spring.datasource.driver-class-name=${BUGTRACKER_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true
spring.jpa.database-platform=${BUGTRACKER_DB_DIALECT:org.hibernate.dialect.H2Dialect}

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

server.servlet.session.timeout=30m
server.error.include-message=always

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.storage.upload-dir=uploads
app.seed-demo-data=true
