spring.application.name=BugTrackPro

spring.datasource.url=${BUGTRACKER_DB_URL:jdbc:mysql://localhost:3306/bugtracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${BUGTRACKER_DB_USERNAME:root}
spring.datasource.password=${BUGTRACKER_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

server.servlet.session.timeout=30m
server.error.include-message=always

app.storage.upload-dir=uploads
app.seed-demo-data=true
